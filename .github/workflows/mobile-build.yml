name: AIUIBuilder Mobile Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip AIUIBuilder project
        shell: bash
        run: |
          test -f AIUIBuilder.zip || (echo "AIUIBuilder.zip not found in repo root" && exit 1)
          rm -rf app llamaLib external build.gradle.kts settings.gradle.kts gradle.properties README.md .gitignore
          unzip -q AIUIBuilder.zip -d /tmp/project
          cp -R /tmp/project/AIUIBuilder/. .
          echo "Project files ready:"
          find . -maxdepth 3 -type f | sort | head -200

      - name: Clone llama.cpp and patch Android runtime
        shell: bash
        run: |
          mkdir -p external
          git clone --depth 1 https://github.com/ggml-org/llama.cpp external/llama.cpp

          mkdir -p llamaLib/src/main/cpp llamaLib/src/main/java
          cp external/llama.cpp/examples/llama.android/lib/src/main/cpp/ai_chat.cpp llamaLib/src/main/cpp/ai_chat.cpp
          cp external/llama.cpp/examples/llama.android/lib/src/main/cpp/logging.h llamaLib/src/main/cpp/logging.h
          cp -R external/llama.cpp/examples/llama.android/lib/src/main/java/* llamaLib/src/main/java/

          # Android API 26 logging compatibility fix.
          sed -i 's/return __android_log_is_loggable(prio, LOG_TAG, LOG_MIN_LEVEL);/return prio >= LOG_MIN_LEVEL;/' llamaLib/src/main/cpp/logging.h

          # Better load error instead of always UnsupportedArchitectureException.
          sed -i 's/if (it != 0) throw UnsupportedArchitectureException()/if (it != 0) throw IOException("Model load failed. Try a smaller Q4 or Q5 GGUF. Possible causes: unsupported architecture, corrupt or split GGUF, or not enough RAM.")/' llamaLib/src/main/java/com/arm/aichat/internal/InferenceEngineImpl.kt

          # Runtime tuning patch: threads/context/batch/temp from Kotlin NativeTuning.
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('llamaLib/src/main/cpp/ai_chat.cpp')
          s = p.read_text()

          # Upstream llama.cpp changes formatting sometimes, so patch constants line-by-line.
          s = re.sub(r'^\s*constexpr\s+int\s+N_THREADS_MIN\s*=\s*[^;]+;\s*\n', '', s, flags=re.M)
          s = re.sub(r'^\s*constexpr\s+int\s+N_THREADS_MAX\s*=\s*[^;]+;\s*\n', '', s, flags=re.M)
          s = re.sub(r'^\s*constexpr\s+int\s+N_THREADS_HEADROOM\s*=\s*[^;]+;\s*\n', '', s, flags=re.M)

          # Convert fixed compile-time constants into runtime-tunable globals.
          s = re.sub(r'^\s*constexpr\s+int\s+DEFAULT_CONTEXT_SIZE\s*=\s*[^;]+;', 'static int g_context_size = 2048;', s, flags=re.M)
          s = re.sub(r'^\s*constexpr\s+int\s+BATCH_SIZE\s*=\s*[^;]+;', 'static int g_batch_size = 256;', s, flags=re.M)
          s = re.sub(r'^\s*constexpr\s+float\s+DEFAULT_SAMPLER_TEMP\s*=\s*[^;]+;', 'static float g_sampler_temp = 0.25f;', s, flags=re.M)

          # If a previous text replacement already renamed the constants, repair those too.
          s = re.sub(r'^\s*constexpr\s+int\s+g_context_size\s*=\s*[^;]+;', 'static int g_context_size = 2048;', s, flags=re.M)
          s = re.sub(r'^\s*constexpr\s+int\s+g_batch_size\s*=\s*[^;]+;', 'static int g_batch_size = 256;', s, flags=re.M)
          s = re.sub(r'^\s*constexpr\s+float\s+g_sampler_temp\s*=\s*[^;]+;', 'static float g_sampler_temp = 0.25f;', s, flags=re.M)

          # Add runtime thread global near other tuning globals if missing.
          if 'static int g_n_threads' not in s:
              marker = 'static int g_context_size = 2048;'
              if marker in s:
                  s = s.replace(marker, 'static int g_n_threads = 4;\n' + marker, 1)
              else:
                  s = 'static int g_n_threads = 4;\nstatic int g_context_size = 2048;\nstatic int g_batch_size = 256;\nstatic float g_sampler_temp = 0.25f;\n' + s

          # Replace original automatic thread calculation with our runtime setting.
          s = re.sub(
              r'const\s+int\s+n_threads\s*=\s*std::max\([^;]+?N_THREADS_HEADROOM\s*\)\s*\)\s*;',
              'const int n_threads = g_n_threads;',
              s,
              flags=re.S
          )

          # Replace usages of old constant names with runtime globals.
          s = s.replace('DEFAULT_CONTEXT_SIZE', 'g_context_size')
          s = s.replace('BATCH_SIZE', 'g_batch_size')
          s = s.replace('DEFAULT_SAMPLER_TEMP', 'g_sampler_temp')

          # Add JNI method called by Kotlin NativeTuning.
          if 'Java_com_arena_aiuibuilder_NativeTuning_setOptions' not in s:
              s += """

          extern \"C\"
          JNIEXPORT void JNICALL
          Java_com_arena_aiuibuilder_NativeTuning_setOptions(JNIEnv *, jclass, jint threads, jint contextSize, jint batchSize, jfloat temperature) {
              int t = (int) threads;
              int c = (int) contextSize;
              int b = (int) batchSize;
              float temp = (float) temperature;
              if (t < 1) t = 1;
              if (t > 8) t = 8;
              if (c < 512) c = 512;
              if (c > 8192) c = 8192;
              if (b < 64) b = 64;
              if (b > 1024) b = 1024;
              if (temp < 0.01f) temp = 0.01f;
              if (temp > 2.0f) temp = 2.0f;
              g_n_threads = t;
              g_context_size = c;
              g_batch_size = b;
              g_sampler_temp = temp;
          }
          """

          required = ['static int g_n_threads', 'static int g_context_size', 'static int g_batch_size', 'static float g_sampler_temp', 'NativeTuning_setOptions']
          missing = [x for x in required if x not in s]
          if missing:
              raise RuntimeError('ai_chat.cpp tuning patch failed, missing: ' + ', '.join(missing))

          p.write_text(s)
          print('Patched ai_chat.cpp tuning successfully')
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK, NDK, and CMake
        shell: bash
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;29.0.13113456" "cmake;3.31.6"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        shell: bash
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIUIBuilder-Dark-Builder-Stable-Rotate-GGUF-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
