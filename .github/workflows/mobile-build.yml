jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Recreate AIUIBuilder project from embedded ZIP
        shell: bash
        run: |
          printf '%s' "$PROJECT_ZIP_B64" | base64 -d -i > /tmp/AIUIBuilder.zip
          rm -rf AIUIBuilder app llamaLib build.gradle.kts settings.gradle.kts gradle.properties .gitignore README.md external
          unzip -q /tmp/AIUIBuilder.zip -d /tmp/project
          cp -R /tmp/project/AIUIBuilder/. .
          echo "Project recreated. Files:"
          find . -maxdepth 3 -type f | sort | sed 's#^./##' | head -200

      - name: Force-create valid llamaLib Android module
        shell: bash
        run: |
          mkdir -p llamaLib/src/main/cpp llamaLib/src/main/java llamaLib/src/main
          cat > settings.gradle.kts <<'SETTINGS'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "AIUIBuilder"
          include(":app")
          include(":llamaLib")
          SETTINGS

          cat > build.gradle.kts <<'ROOTGRADLE'
          plugins {
              id("com.android.application") version "8.7.3" apply false
              id("com.android.library") version "8.7.3" apply false
              id("org.jetbrains.kotlin.android") version "2.0.21" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.0.21" apply false
              id("org.jetbrains.kotlin.plugin.serialization") version "2.0.21" apply false
          }
          ROOTGRADLE

          cat > llamaLib/build.gradle.kts <<'LIBGRADLE'
          plugins {
              id("com.android.library")
              id("org.jetbrains.kotlin.android")
          }
          android {
              namespace = "com.arm.aichat"
              compileSdk = 35
              ndkVersion = "29.0.13113456"
              defaultConfig {
                  minSdk = 26
                  consumerProguardFiles("consumer-rules.pro")
                  ndk { abiFilters += listOf("arm64-v8a") }
                  externalNativeBuild {
                      cmake {
                          arguments += "-DCMAKE_BUILD_TYPE=Release"
                          arguments += "-DBUILD_SHARED_LIBS=ON"
                          arguments += "-DLLAMA_BUILD_APP=OFF"
                          arguments += "-DLLAMA_BUILD_COMMON=ON"
                          arguments += "-DLLAMA_OPENSSL=OFF"
                          arguments += "-DGGML_NATIVE=OFF"
                          arguments += "-DGGML_BACKEND_DL=OFF"
                          arguments += "-DGGML_CPU_ALL_VARIANTS=OFF"
                          arguments += "-DGGML_LLAMAFILE=OFF"
                      }
                  }
                  aarMetadata { minCompileSdk = 35 }
              }
              externalNativeBuild { cmake { path("src/main/cpp/CMakeLists.txt"); version = "3.31.6" } }
              compileOptions { sourceCompatibility = JavaVersion.VERSION_17; targetCompatibility = JavaVersion.VERSION_17 }
              kotlinOptions { jvmTarget = "17" }
              packaging { resources { excludes += "/META-INF/{AL2.0,LGPL2.1}" } }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.15.0")
              implementation("androidx.datastore:datastore-preferences:1.1.1")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0")
          }
          LIBGRADLE

          cat > llamaLib/src/main/AndroidManifest.xml <<'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" />
          MANIFEST
          echo '-keep class com.arm.aichat.** { *; }' > llamaLib/consumer-rules.pro
          echo '-keep class com.arm.aichat.** { *; }' > llamaLib/proguard-rules.pro

          cat > llamaLib/src/main/cpp/CMakeLists.txt <<'CMAKE'
          cmake_minimum_required(VERSION 3.31.6)
          project("ai-chat" VERSION 1.0.0 LANGUAGES C CXX)
          set(CMAKE_C_STANDARD 11)
          set(CMAKE_C_STANDARD_REQUIRED true)
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED true)
          if(DEFINED ANDROID_ABI)
              message(STATUS "Detected Android ABI: ${ANDROID_ABI}")
              if(ANDROID_ABI STREQUAL "arm64-v8a")
                  set(GGML_SYSTEM_ARCH "ARM")
                  set(GGML_CPU_KLEIDIAI OFF)
                  set(GGML_OPENMP OFF)
              else()
                  message(FATAL_ERROR "Unsupported ABI: ${ANDROID_ABI}")
              endif()
          endif()
          set(LLAMA_SRC ${CMAKE_CURRENT_LIST_DIR}/../../../../external/llama.cpp)
          if(NOT EXISTS ${LLAMA_SRC}/CMakeLists.txt)
              message(FATAL_ERROR "llama.cpp not found at ${LLAMA_SRC}")
          endif()
          add_subdirectory(${LLAMA_SRC} build-llama)
          add_library(${CMAKE_PROJECT_NAME} SHARED ai_chat.cpp)
          target_compile_definitions(${CMAKE_PROJECT_NAME} PRIVATE
              GGML_SYSTEM_ARCH=${GGML_SYSTEM_ARCH}
              GGML_CPU_KLEIDIAI=$<BOOL:${GGML_CPU_KLEIDIAI}>
              GGML_OPENMP=$<BOOL:${GGML_OPENMP}>
          )
          target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE
              ${LLAMA_SRC} ${LLAMA_SRC}/common ${LLAMA_SRC}/include ${LLAMA_SRC}/ggml/include ${LLAMA_SRC}/ggml/src
          )
          target_link_libraries(${CMAKE_PROJECT_NAME} llama llama-common android log)
          CMAKE

      - name: Clone llama.cpp and patch Android JNI runtime
        shell: bash
        run: |
          mkdir -p external
          git clone --depth 1 https://github.com/ggml-org/llama.cpp external/llama.cpp
          cp external/llama.cpp/examples/llama.android/lib/src/main/cpp/ai_chat.cpp llamaLib/src/main/cpp/ai_chat.cpp
          cp external/llama.cpp/examples/llama.android/lib/src/main/cpp/logging.h llamaLib/src/main/cpp/logging.h
          mkdir -p llamaLib/src/main/java
          cp -R external/llama.cpp/examples/llama.android/lib/src/main/java/* llamaLib/src/main/java/

          sed -i 's/return __android_log_is_loggable(prio, LOG_TAG, LOG_MIN_LEVEL);/return prio >= LOG_MIN_LEVEL;/' llamaLib/src/main/cpp/logging.h
          sed -i 's/if (it != 0) throw UnsupportedArchitectureException()/if (it != 0) throw IOException("Model load failed. Try a smaller Q4 or Q5 GGUF. Possible causes: unsupported architecture, corrupt or split GGUF, or not enough RAM.")/' llamaLib/src/main/java/com/arm/aichat/internal/InferenceEngineImpl.kt

          python3 - <<'PY'
          from pathlib import Path
          import re
          p = Path('llamaLib/src/main/cpp/ai_chat.cpp')
          s = p.read_text()
          s = re.sub(
              r'constexpr int N_THREADS_MIN = 2;\s*constexpr int N_THREADS_MAX = 4;\s*constexpr int N_THREADS_HEADROOM = 2;\s*constexpr int DEFAULT_CONTEXT_SIZE = 8192;\s*constexpr int OVERFLOW_HEADROOM = 4;\s*constexpr int BATCH_SIZE = 512;\s*constexpr float DEFAULT_SAMPLER_TEMP = 0\.3f;',
              'static int g_n_threads = 4;\nstatic int g_context_size = 2048;\nconstexpr int OVERFLOW_HEADROOM = 4;\nstatic int g_batch_size = 256;\nstatic float g_sampler_temp = 0.25f;',
              s,
              flags=re.S
          )
          s = re.sub(
              r'const int n_threads = std::max\(N_THREADS_MIN,\s*std::min\(N_THREADS_MAX,\s*\(int\) sysconf\(_SC_NPROCESSORS_ONLN\) -\s*N_THREADS_HEADROOM\)\);',
              'const int n_threads = g_n_threads;',
              s,
              flags=re.S
          )
          s = s.replace('DEFAULT_CONTEXT_SIZE', 'g_context_size')
          s = s.replace('BATCH_SIZE', 'g_batch_size')
          s = s.replace('DEFAULT_SAMPLER_TEMP', 'g_sampler_temp')
          s += r'''

extern "C"
JNIEXPORT void JNICALL
Java_com_arena_aiuibuilder_NativeTuning_setOptions(JNIEnv *, jclass, jint threads, jint contextSize, jint batchSize, jfloat temperature) {
    int t = (int) threads;
    int c = (int) contextSize;
    int b = (int) batchSize;
    float temp = (float) temperature;
    if (t < 1) t = 1;
    if (t > 8) t = 8;
    if (c < 512) c = 512;
    if (c > 8192) c = 8192;
    if (b < 64) b = 64;
    if (b > 1024) b = 1024;
    if (temp < 0.01f) temp = 0.01f;
    if (temp > 2.0f) temp = 2.0f;
    g_n_threads = t;
    g_context_size = c;
    g_batch_size = b;
    g_sampler_temp = temp;
}
'''
          p.write_text(s)
          print('Patched ai_chat.cpp. Tuning JNI present:', 'NativeTuning_setOptions' in s)
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK, NDK, and CMake packages
        shell: bash
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;29.0.13113456" "cmake;3.31.6"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        shell: bash
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIUIBuilder-Dark-Builder-Stable-Rotate-GGUF-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
